id: openai
display_name: OpenAI
base_url: https://api.openai.com
default_api: openai-responses
auth_modes:
  - api_key
  - oauth
discovery:
  path: /v1/models
  response: open_ai_models
  api: openai-responses
  context_window: 1047576
  max_output_tokens: 128000
  supports_reasoning: true
media:
  image:
    discovery:
      adapter: static
    execution:
      adapter: images_json
      path: /v1/images/generations
    models:
      - id: gpt-image-2
        display_name: GPT Image 2
        operations:
          - generate
        parameters:
          - name: size
            label: Size
            values: [auto, 1024x1024, 1024x1536, 1536x1024, 2048x2048, 2048x1152, 2560x1440, 3840x2160, 2160x3840]
            default: auto
            request_field: size
          - name: quality
            label: Quality
            values: [auto, low, medium, high]
            default: auto
            request_field: quality
          - name: output_format
            label: Output format
            values: [png, jpeg, webp]
            default: png
            request_field: output_format
      - id: gpt-image-1.5
        display_name: GPT Image 1.5
