id: zhipu
display_name: Zhipu (BigModel)
# Zhipu's OpenAI-compatible Chat Completions endpoint lives under
# `/api/paas/v4/chat/completions`, NOT `/v1/chat/completions`. We
# encode the versioned prefix in `base_url` and override
# `chat_completions_path` so puffer doesn't construct
# `…/v4/v1/chat/completions` and 404 the call.
base_url: https://open.bigmodel.cn/api/paas/v4
chat_completions_path: /chat/completions
default_api: openai-completions
auth_modes:
  - api_key
media:
  image:
    discovery:
      adapter: static
    execution:
      adapter: images_json
      path: /images/generations
      batch:
        mode: per_image
    models:
      - id: glm-image
        display_name: GLM Image
        operations:
          - generate
        parameters:
          - name: size
            label: Size
            values: [1280x1280, 1568x1056, 1056x1568, 1472x1088, 1088x1472, 1728x960, 960x1728]
            default: 1280x1280
            request_field: size
          - name: quality
            label: Quality
            values: [hd]
            default: hd
            request_field: quality
      - id: cogview-4-250304
        display_name: CogView 4 250304
        operations:
          - generate
        parameters:
          - name: size
            label: Size
            values: [1024x1024, 768x1344, 864x1152, 1344x768, 1152x864, 1440x720, 720x1440]
            default: 1024x1024
            request_field: size
          - name: quality
            label: Quality
            values: [standard, hd]
            default: standard
            request_field: quality
      - id: cogview-4
        display_name: CogView 4
        operations:
          - generate
        parameters:
          - name: size
            label: Size
            values: [1024x1024, 768x1344, 864x1152, 1344x768, 1152x864, 1440x720, 720x1440]
            default: 1024x1024
            request_field: size
          - name: quality
            label: Quality
            values: [standard, hd]
            default: standard
            request_field: quality
      - id: cogview-3-flash
        display_name: CogView 3 Flash
        operations:
          - generate
        parameters:
          - name: size
            label: Size
            values: [1024x1024, 768x1344, 864x1152, 1344x768, 1152x864, 1440x720, 720x1440]
            default: 1024x1024
            request_field: size
          - name: quality
            label: Quality
            values: [standard, hd]
            default: standard
            request_field: quality
models:
  - id: glm-4.6
    display_name: GLM-4.6
    provider: zhipu
    api: openai-completions
    context_window: 200000
    max_output_tokens: 32768
    supports_reasoning: true
  - id: glm-4.5
    display_name: GLM-4.5
    provider: zhipu
    api: openai-completions
    context_window: 128000
    max_output_tokens: 32768
    supports_reasoning: true
