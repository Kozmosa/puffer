id: worldrouter
display_name: WorldRouter
base_url: https://inference-api.worldrouter.ai/v1
default_api: openai-completions
chat_completions_path: /chat/completions
auth_modes:
  - api_key
discovery:
  path: /models
  response: open_ai_models
  api: openai-completions
  context_window: 200000
  max_output_tokens: 16384
  supports_reasoning: true
media:
  image:
    discovery:
      adapter: static
    execution:
      adapter: images_json
      path: /images/generations
      batch:
        mode: per_image
    models:
      - id: gpt-image-2
        display_name: GPT Image 2
        operations:
          - generate
        axes:
          - { id: ratio, label: Ratio, role: param, control: !enum { values: ["1:1", "3:2", "2:3"], default: "1:1" } }
        media_map:
          ratio:
            field: size
            values:
              "1:1": "1024x1024"
              "3:2": "1536x1024"
              "2:3": "1024x1536"
        variants: { model_id: gpt-image-2 }
  video:
    discovery:
      adapter: static
    execution:
      adapter: relaydance_video
      base_url: https://inference-api.worldrouter.ai
      path: /api/v3/contents/generations/tasks
      prompt_format: content_array
    models:
      - id: seedance-2.0
        display_name: Seedance 2.0
        operations:
          - generate
        axes:
          - { id: resolution, label: Mode, role: selector, control: !enum { values: ["720p", "1080p"], default: "1080p" } }
          - { id: duration, label: Duration, role: param, control: !range { min: 5.0, max: 10.0, step: 1.0, default: 5.0 }, request_field: duration, wire_type: number }
          - { id: ratio, label: Ratio, role: param, control: !enum { values: ["Auto", "16:9", "4:3", "1:1", "3:4", "9:16", "21:9"], default: "16:9" } }
        media_map:
          ratio:
            field: ratio
            values:
              Auto: adaptive
              "16:9": "16:9"
              "4:3": "4:3"
              "1:1": "1:1"
              "3:4": "3:4"
              "9:16": "9:16"
              "21:9": "21:9"
        variants:
          selector: resolution
          map:
            "720p": { model_id: seedance-2.0, base_params: { resolution: "720p" } }
            "1080p": { model_id: seedance-2.0, base_params: { resolution: "1080p" } }
      - id: seedance-2.0-fast
        display_name: Seedance 2.0 Fast
        operations:
          - generate
        axes:
          - { id: resolution, label: Mode, role: param, control: !enum { values: ["480p", "720p"], default: "720p" }, request_field: resolution }
          - { id: duration, label: Duration, role: param, control: !range { min: 5.0, max: 10.0, step: 1.0, default: 5.0 }, request_field: duration, wire_type: number }
          - { id: ratio, label: Ratio, role: param, control: !enum { values: ["Auto", "16:9", "4:3", "1:1", "3:4", "9:16", "21:9"], default: "16:9" } }
        media_map:
          ratio:
            field: ratio
            values:
              Auto: adaptive
              "16:9": "16:9"
              "4:3": "4:3"
              "1:1": "1:1"
              "3:4": "3:4"
              "9:16": "9:16"
              "21:9": "21:9"
        variants: { model_id: seedance-2.0-fast }
models:
  - id: auto
    display_name: Auto
    provider: worldrouter
    api: openai-completions
    context_window: 200000
    max_output_tokens: 16384
    supports_reasoning: true
