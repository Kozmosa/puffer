id: minimax
display_name: MiniMax
base_url: https://api.minimax.io/anthropic
default_api: anthropic-messages
auth_modes:
  - api_key
media:
  image:
    discovery:
      adapter: static
    execution:
      adapter: minimax_image
      base_url: https://api.minimax.io
      path: /v1/image_generation
      batch:
        mode: per_image
    models:
      - id: image-01
        display_name: Image 01
        operations:
          - generate
        parameters:
          - name: aspect_ratio
            label: Aspect ratio
            values: ["1:1", "16:9", "4:3", "3:2", "2:3", "3:4", "9:16", "21:9"]
            default: "1:1"
            request_field: aspect_ratio
          - name: response_format
            label: Response format
            values: [url, base64]
            default: base64
            request_field: response_format
models:
  - id: MiniMax-M2.7
    display_name: MiniMax-M2.7
    provider: minimax
    api: anthropic-messages
    context_window: 204800
    max_output_tokens: 131072
    supports_reasoning: true
