id: xai
display_name: xAI
base_url: https://api.x.ai/v1
default_api: openai-completions
auth_modes:
  - api_key
discovery:
  path: /models
  response: open_ai_models
  api: openai-completions
  context_window: 256000
  max_output_tokens: 10000
  supports_reasoning: true
media:
  image:
    discovery:
      adapter: static
    execution:
      adapter: images_json
      path: /images/generations
      batch:
        mode: per_image
    models:
      - id: grok-imagine-image-quality
        display_name: Grok Imagine Image Quality
        operations:
          - generate
        axes:
          - { id: aspect_ratio, label: "Aspect ratio", role: param, control: !enum { values: ["1:1", "3:4", "4:3", "9:16", "16:9", "2:3", "3:2", "9:19.5", "19.5:9", "9:20", "20:9", "1:2", "2:1", "auto"], default: "auto" }, request_field: aspect_ratio }
          - { id: resolution, label: "Resolution", role: param, control: !enum { values: ["1k", "2k"], default: "1k" }, request_field: resolution }
          - { id: response_format, label: "Response format", role: param, control: !enum { values: ["url", "b64_json"], default: "url" }, request_field: response_format }
        variants: { model_id: grok-imagine-image-quality }
      - id: grok-imagine-image
        display_name: Grok Imagine Image
        operations:
          - generate
        axes:
          - { id: aspect_ratio, label: "Aspect ratio", role: param, control: !enum { values: ["1:1", "3:4", "4:3", "9:16", "16:9", "2:3", "3:2", "9:19.5", "19.5:9", "9:20", "20:9", "1:2", "2:1", "auto"], default: "auto" }, request_field: aspect_ratio }
          - { id: resolution, label: "Resolution", role: param, control: !enum { values: ["1k", "2k"], default: "1k" }, request_field: resolution }
          - { id: response_format, label: "Response format", role: param, control: !enum { values: ["url", "b64_json"], default: "url" }, request_field: response_format }
        variants: { model_id: grok-imagine-image }
models:
  - id: grok-code-fast-1
    display_name: Grok Code Fast 1
    provider: xai
    api: openai-completions
    context_window: 256000
    max_output_tokens: 10000
    supports_reasoning: true
