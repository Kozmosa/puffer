id: byteplus
display_name: BytePlus
base_url: https://ark.ap-southeast.bytepluses.com/api/v3
chat_completions_path: /chat/completions
default_api: openai-completions
auth_modes:
  - api_key
discovery:
  path: /models
  response: open_ai_models
  api: openai-completions
  context_window: 128000
  max_output_tokens: 16384
  supports_reasoning: true
media:
  image:
    discovery:
      adapter: static
    execution:
      adapter: images_json
      path: /images/generations
    models:
      - id: seedream-5-0-260128
        display_name: Seedream 5.0 Lite
        operations:
          - generate
        parameters:
          - name: size
            label: Size
            values: [2K]
            default: 2K
            request_field: size
          - name: output_format
            label: Output format
            values: [png, jpeg]
            default: jpeg
            request_field: output_format
          - name: response_format
            label: Response format
            values: [b64_json, url]
            default: b64_json
            request_field: response_format
      - id: seedream-4-5-251128
        display_name: Seedream 4.5
        operations:
          - generate
        parameters:
          - name: size
            label: Size
            values: [2K]
            default: 2K
            request_field: size
          - name: response_format
            label: Response format
            values: [b64_json, url]
            default: b64_json
            request_field: response_format
      - id: seedream-4-0-250828
        display_name: Seedream 4.0
        operations:
          - generate
        parameters:
          - name: size
            label: Size
            values: [2K]
            default: 2K
            request_field: size
          - name: response_format
            label: Response format
            values: [b64_json, url]
            default: b64_json
            request_field: response_format
