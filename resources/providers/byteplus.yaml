id: byteplus
display_name: BytePlus
base_url: https://ark.ap-southeast.bytepluses.com/api/v3
chat_completions_path: /chat/completions
default_api: openai-completions
auth_modes:
  - api_key
discovery:
  path: /models
  response: open_ai_models
  api: openai-completions
  context_window: 128000
  max_output_tokens: 16384
  supports_reasoning: true
media:
  video:
    discovery:
      adapter: static
    execution:
      adapter: byteplus_video
      path: /contents/generations/tasks
    models:
      - id: dreamina-seedance-2-0
        display_name: Dreamina Seedance 2.0
        operations:
          - generate
        axes:
          - { id: resolution, label: Mode, role: param, control: !enum { values: ["480p", "720p", "1080p"], default: "720p" }, request_field: resolution }
          - { id: duration, label: Length, role: param, control: !range { min: 4.0, max: 15.0, step: 1.0, default: 5.0 }, request_field: duration, wire_type: number }
          - { id: ratio, label: Video ratio, role: param, control: !enum { values: ["16:9", "4:3", "1:1", "3:4", "9:16", "21:9", "adaptive"], default: "adaptive" }, request_field: ratio }
        variants: { model_id: dreamina-seedance-2-0-260128 }
      - id: dreamina-seedance-2-0-fast
        display_name: Dreamina Seedance 2.0 Fast
        operations:
          - generate
        axes:
          - { id: resolution, label: Mode, role: param, control: !enum { values: ["480p", "720p"], default: "720p" }, request_field: resolution }
          - { id: duration, label: Length, role: param, control: !range { min: 4.0, max: 15.0, step: 1.0, default: 5.0 }, request_field: duration, wire_type: number }
          - { id: ratio, label: Video ratio, role: param, control: !enum { values: ["16:9", "4:3", "1:1", "3:4", "9:16", "21:9", "adaptive"], default: "adaptive" }, request_field: ratio }
        variants: { model_id: dreamina-seedance-2-0-fast-260128 }
  image:
    discovery:
      adapter: static
    execution:
      adapter: images_json
      path: /images/generations
      batch:
        mode: per_image
    models:
      - id: seedream-5-0-260128
        display_name: Seedream 5.0 Lite
        operations:
          - generate
        axes:
          - { id: size, label: Size, role: param, control: !enum { values: ["2K"], default: "2K" }, request_field: size }
          - { id: output_format, label: Output format, role: param, control: !enum { values: ["png", "jpeg"], default: "jpeg" }, request_field: output_format }
          - { id: response_format, label: Response format, role: param, control: !enum { values: ["b64_json", "url"], default: "b64_json" }, request_field: response_format }
          - { id: sequential_image_generation, label: Sequential image generation, role: param, control: !enum { values: ["disabled", "auto"], default: "disabled" }, request_field: sequential_image_generation }
        variants: { model_id: seedream-5-0-260128 }
      - id: seedream-4-5-251128
        display_name: Seedream 4.5
        operations:
          - generate
        axes:
          - { id: size, label: Size, role: param, control: !enum { values: ["2K"], default: "2K" }, request_field: size }
          - { id: response_format, label: Response format, role: param, control: !enum { values: ["b64_json", "url"], default: "b64_json" }, request_field: response_format }
          - { id: sequential_image_generation, label: Sequential image generation, role: param, control: !enum { values: ["disabled", "auto"], default: "disabled" }, request_field: sequential_image_generation }
        variants: { model_id: seedream-4-5-251128 }
      - id: seedream-4-0-250828
        display_name: Seedream 4.0
        operations:
          - generate
        axes:
          - { id: size, label: Size, role: param, control: !enum { values: ["2K"], default: "2K" }, request_field: size }
          - { id: response_format, label: Response format, role: param, control: !enum { values: ["b64_json", "url"], default: "b64_json" }, request_field: response_format }
          - { id: sequential_image_generation, label: Sequential image generation, role: param, control: !enum { values: ["disabled", "auto"], default: "disabled" }, request_field: sequential_image_generation }
        variants: { model_id: seedream-4-0-250828 }
