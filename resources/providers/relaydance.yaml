id: relaydance
display_name: Relaydance
base_url: https://relaydance.com
default_api: openai-completions
auth_modes:
  - api_key
discovery:
  path: /v1/models
  response: open_ai_models
  api: openai-completions
  context_window: 128000
  max_output_tokens: 16384
  supports_reasoning: false
media:
  video:
    discovery:
      adapter: static
    execution:
      adapter: relaydance_video
      path: /v1/video/generations
    models:
      - id: doubao-seedance-2-0
        display_name: Seedance 2.0
        operations:
          - generate
        axes:
          - { id: resolution, label: Mode, role: selector, control: !enum { values: ["720p", "1080p"], default: "1080p" } }
          - { id: duration, label: Length, role: param, control: !range { min: 4.0, max: 15.0, step: 1.0, default: 5.0 }, request_field: seconds, wire_type: number }
          - { id: ratio, label: Video ratio, role: param, control: !enum { values: ["16:9", "4:3", "1:1", "3:4", "9:16", "21:9", "adaptive"], default: "16:9" }, request_field: metadata.ratio }
        variants:
          selector: resolution
          map:
            "720p": { model_id: doubao-seedance-2-0-720p, base_params: { "metadata.resolution": "720p" } }
            "1080p": { model_id: doubao-seedance-2-0-1080p, base_params: { "metadata.resolution": "1080p" } }
      - id: doubao-seedance-2-0-fast
        display_name: Seedance 2.0 Fast
        operations:
          - generate
        axes:
          - { id: resolution, label: Mode, role: param, control: !enum { values: ["480p", "720p"], default: "720p" }, request_field: metadata.resolution }
          - { id: duration, label: Length, role: param, control: !range { min: 4.0, max: 15.0, step: 1.0, default: 5.0 }, request_field: seconds, wire_type: number }
          - { id: ratio, label: Video ratio, role: param, control: !enum { values: ["16:9", "4:3", "1:1", "3:4", "9:16", "21:9", "adaptive"], default: "16:9" }, request_field: metadata.ratio }
        variants: { model_id: doubao-seedance-2-0-fast-260128 }
      - id: seedance-1-5-pro
        display_name: Seedance 1.5 Pro
        operations:
          - generate
        axes:
          - { id: resolution, label: Mode, role: param, control: !enum { values: ["480p", "720p", "1080p"], default: "1080p" }, request_field: metadata.resolution }
          - { id: duration, label: Length, role: param, control: !range { min: 4.0, max: 12.0, step: 1.0, default: 5.0 }, request_field: seconds, wire_type: number }
          - { id: ratio, label: Video ratio, role: param, control: !enum { values: ["16:9", "4:3", "1:1", "3:4", "9:16", "21:9", "adaptive"], default: "16:9" }, request_field: metadata.ratio }
          - { id: audio, label: Native audio, role: selector, control: !bool { default: true } }
        variants:
          selector: audio
          map:
            "true": { model_id: seedance-1-5-pro-with-audio }
            "false": { model_id: seedance-1-5-pro-no-audio }
      - id: seedance-nsfw
        display_name: Seedance NSFW
        operations:
          - generate
        axes:
          - { id: resolution, label: Mode, role: selector, control: !enum { values: ["720p", "1080p"], default: "1080p" } }
          - { id: duration, label: Length, role: param, control: !range { min: 4.0, max: 15.0, step: 1.0, default: 5.0 }, request_field: seconds, wire_type: number }
          - { id: ratio, label: Video ratio, role: param, control: !enum { values: ["16:9", "4:3", "1:1", "3:4", "9:16", "21:9", "adaptive"], default: "16:9" }, request_field: metadata.ratio }
        variants:
          selector: resolution
          map:
            "720p": { model_id: seedance-nsfw-720p, base_params: { "metadata.resolution": "720p" } }
            "1080p": { model_id: seedance-nsfw-1080p, base_params: { "metadata.resolution": "1080p" } }
      - id: seedance-fast-nsfw
        display_name: Seedance Fast NSFW
        operations:
          - generate
        axes:
          - { id: resolution, label: Mode, role: param, control: !enum { values: ["480p", "720p"], default: "720p" }, request_field: metadata.resolution }
          - { id: duration, label: Length, role: param, control: !range { min: 4.0, max: 15.0, step: 1.0, default: 5.0 }, request_field: seconds, wire_type: number }
          - { id: ratio, label: Video ratio, role: param, control: !enum { values: ["16:9", "4:3", "1:1", "3:4", "9:16", "21:9", "adaptive"], default: "16:9" }, request_field: metadata.ratio }
        variants: { model_id: seedance-fast-nsfw }
      - id: grok-imagine-video
        display_name: Grok Imagine Video
        operations:
          - generate
        variants: { model_id: grok-imagine-video }
      - id: grok-imagine-video-1.5-preview
        display_name: Grok Imagine Video 1.5 Preview
        operations:
          - generate
        variants: { model_id: grok-imagine-video-1.5-preview }
      - id: happyhorse-1.0-t2v
        display_name: HappyHorse 1.0 Text to Video
        operations:
          - generate
        variants: { model_id: happyhorse-1.0-t2v }
