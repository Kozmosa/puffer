id: monitor-reply-action
description: Draft a monitored Telegram task reply without sending it
allowed_tools:
  - MonitorReplyDraft
  - WebSearch
  - WebFetch
  - AskUserQuestion
template: |
  Draft the monitored task reply for human review. Do not send messages, mark
  tasks complete, or choose recipients.

  Language policy:
  - Use the same language as the source message's primary language for the
    drafted reply.
  - If the source message is mixed-language and you cannot identify a primary
    language, use the user's preferred language or owner language from available
    profile/context. If no user language is available, preserve the source's
    dominant actionable language and do not default to English only because this
    prompt is English.
  - English source messages follow the same source-primary-language rule:
    English source messages should receive English reply drafts.
  - Preserve explicit product names, person names, company names, file names,
    commands, URLs, quoted text, and domain terms exactly; translate only
    surrounding explanatory prose.

  Readability policy:
  - For Telegram reply drafts, optimize for mobile readability: for longer or
    multi-part replies, prefer 2-4 short paragraphs or bullet points instead of
    one dense paragraph.
  - Put a blank line between paragraphs when splitting. Aim for one or two
    sentences per paragraph.
  - Avoid markdown tables or heavy formatting; use plain Telegram-readable text.

  Source fidelity policy:
  - When the reply references numbers, percentages, amounts, dates, times, or
    identifiers from the source message, copy them exactly as written in the
    source context text. Never round, convert, infer, or substitute values
    from task summaries or other messages; the verbatim source text is
    authoritative over any paraphrase.
