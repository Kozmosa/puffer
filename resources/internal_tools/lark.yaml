id: Lark
name: Lark
aliases:
  - lark
description: |-
  Lark app/login configuration and lookup surface. `/connect lark-app
  <connection>` or `/connect lark-login <connection>` may expose this as a
  scoped runtime tool for auth; the `lark` skill exposes the same operations
  through the internal CLI for lookup-oriented work.

  This tool stores Lark app credentials or user access token credentials under
  a named connection. It also lists/searches chats, users, and messages so
  agents can resolve stable Lark ids before invoking connector actions.
  Message sends, file uploads, replies, and reactions are connector actions on
  `lark-app` or `lark-login`, not separate Lark runtime commands.
handler: runtime:workflow:lark
approval_policy: ask
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    action:
      type: string
      enum:
        - configure_app
        - import_env
        - list_chats
        - login_token
        - mget_messages
        - read_messages
        - search_chats
        - search_messages
        - search_users
      description: Lark action to perform.
    connection_slug:
      type: string
      description: Optional authorized Lark connection slug. Defaults to lark-app for configure_app and app env imports, lark-login otherwise.
    account_slug:
      type: string
      description: Alias for connection_slug when selecting a Lark account connection.
    account:
      type: string
      description: Alias for connection_slug when selecting a Lark account connection.
    brand:
      type: string
      enum: [lark, feishu]
      description: Lark endpoint brand. Defaults to lark unless importing LARK_BRAND.
    app_id:
      type: string
      description: Lark app id for configure_app or login_token metadata.
    app_secret:
      type: string
      description: Lark app secret for configure_app.
    user_access_token:
      type: string
      description: Lark user access token for login_token.
    query:
      type: string
      description: Search query for search_chats, search_users, or search_messages.
    page_size:
      type: integer
      description: Optional maximum result count.
    page_token:
      type: string
      description: Optional Lark pagination token.
    search_types:
      type: string
      description: Optional comma-separated chat type filters for search_chats.
    user_ids:
      type: string
      description: Optional comma-separated open_ids for search_users.
    has_chatted:
      type: boolean
      description: Restrict search_users to contacts with a P2P chat.
    exclude_external_users:
      type: boolean
      description: Exclude cross-tenant users from search_users.
    chat_id:
      type: string
      description: Lark chat id for read_messages.
    thread_id:
      type: string
      description: Lark thread id for read_messages when reading thread replies.
    sort:
      type: string
      description: Optional read_messages sort order, asc or desc.
    start_time:
      type: string
      description: Optional Lark read_messages start_time value.
    end_time:
      type: string
      description: Optional Lark read_messages end_time value.
    chat_ids:
      type: string
      description: Optional comma-separated chat ids for search_messages.
    sender_ids:
      type: string
      description: Optional comma-separated sender open_ids for search_messages.
    chat_type:
      type: string
      description: Optional search_messages chat type, group or p2p.
    message_ids:
      type: string
      description: Comma-separated Lark message ids for mget_messages.
  required:
    - action
  additionalProperties: false
metadata:
  may_spawn_processes: false
  may_read_files: true
  may_write_files: true
display:
  group: subscribers
  title: Lark
  show_in_status: true
