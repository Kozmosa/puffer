id: Browser
name: Browser
aliases:
  - browser
description: |-
  Internal CLI-only Browser surface. Agents should use the `browser` skill and
  run `puffer internal-tool browser ...` through Bash instead of receiving this
  as a provider tool call.
handler: runtime:browser
approval_policy: auto
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    action:
      type: string
      enum:
        - list
        - open
        - new
        - focus
        - focus_ref
        - close
        - quit
        - navigate
        - reload
        - back
        - forward
        - snapshot
        - click
        - dblclick
        - hover
        - type
        - insertText
        - fill
        - select
        - check
        - uncheck
        - press
        - keydown
        - keyup
        - scroll
        - scrollIntoView
        - evaluate
      description: "Browser action to perform. `focus` switches tabs by `tabId`; `focus_ref` targets one snapshot ref. `open` with `url` is already a navigation."
    sessionId:
      type: string
      description: Puffer session id. Defaults to the current agent session.
    tabId:
      type: string
      description: Stable browser tab id such as t1 or t2.
    label:
      type: string
      description: Optional stable label for a newly opened tab.
    url:
      type: string
      description: URL for open or navigate actions. Prefer one `open` call when creating a tab at a URL.
    ref:
      type: string
      description: Fresh element ref from the latest snapshot for ref-based actions, such as @e1.
    value:
      type: string
      description: Exact option value or label text for `select` actions.
    text:
      type: string
      description: Text for `type`, `insertText`, or `fill` actions.
    key:
      type: string
      description: Keyboard key for `press`, `keydown`, or `keyup`, such as Enter or Escape.
    script:
      type: string
      description: JavaScript expression for `evaluate` actions.
    direction:
      type: string
      description: "Scroll direction for `scroll` actions: up, down, left, or right."
    px:
      type: integer
      description: Optional scroll distance in pixels for `scroll` actions. Defaults to 600.
    width:
      type: integer
      description: Optional viewport width for launching a tab.
    height:
      type: integer
      description: Optional viewport height for launching a tab.
    activate:
      type: boolean
      description: Whether a newly opened tab should become active.
  required:
    - action
  additionalProperties: false
metadata:
  may_spawn_processes: true
  may_read_files: false
  may_write_files: false
display:
  group: browser
  title: Browser
  show_in_status: true
