id: SubscriptionCreate
name: SubscriptionCreate
description: |-
  Install a standing **subscription** that watches a stream of external
  events (Telegram messages, emails, RSS items, …) and runs an action
  whenever an event matches.

  Use this when the user describes ongoing monitoring or automation
  work — anything of the form "watch X and do Y when Z." Examples:

  - "Watch all my Telegram chats for IoC mentions and save them to a SQLite db."
  - "Whenever Zara sends me a promo email, forward it to Hongyi on Telegram."
  - "Save every link posted in #releases to my links.db."

  ## Pipeline

  Each event flows through three stages: a regex **prefilter** (cheap),
  an optional LLM **classify_prompt** (yes/no judgement), and exactly one
  **action**.

  ## Source topics

  - `telegram-user` — every message in every Telegram chat the logged-in user is in.
    Requires the user to log in through the `telegram` skill first.
  - `email` — inbound email from the configured mailbox.
    Requires the user to configure email through the `email` skill first.

  ## Actions

  - `sqlite_insert` — append one row per matched event.
    Required: `path` (sqlite db file), `table` (a-z, A-Z, 0-9, _ only).
    Schema is created on demand and includes envelope_id, received_at_ms,
    subscriber_id, topic, kind, dedup_key, text, payload (JSON).
  - `forward_message` — relay the event to another platform.
    Required: `platform`, `target`. Optional: `template` with `{{text}}` and
    `{{payload.field}}` substitutions.

  ## Tips

  - Pick a short, kebab-case `id` like `ioc-watch` or `zara-promos`.
  - When unsure, use only a `prefilter` (regex) — cheap and deterministic.
  - Add `classify_prompt` only when regex isn't enough; it costs an LLM call per matched event.
  - Confirm the spec with the user in plain language before calling this tool.
handler: runtime:workflow:subscription_create
approval_policy: ask
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    id:
      type: string
      description: Stable kebab-case id (e.g. "ioc-watch"). Must be unique.
    description:
      type: string
      description: Free-form description from the user prompt; surfaced in /subscriptions list.
    source_topic:
      type: string
      description: Subscriber topic to listen on (e.g. "telegram-user").
    prefilter:
      type: object
      description: Optional regex prefilter.
      properties:
        type:
          type: string
          enum: [regex]
        pattern:
          type: string
          description: Rust regex syntax (no PCRE backrefs).
        case_insensitive:
          type: boolean
          default: true
      required: [type, pattern]
    classify_prompt:
      type: string
      description: Optional yes/no LLM judge prompt; runs after the prefilter passes.
    classify_model:
      type: string
      description: |-
        Optional model hint for the LLM judge in `<provider>/<model>` form
        (e.g. `anthropic/claude-haiku-4-5`). Defaults to a fast Anthropic
        model when omitted. Only set this if the user has expressed a
        preference; otherwise leave it unset.
    action:
      type: object
      description: Exactly one action to execute when the message matches.
      oneOf:
        - properties:
            type:
              type: string
              enum: [sqlite_insert]
            path:
              type: string
            table:
              type: string
              pattern: "^[A-Za-z_][A-Za-z0-9_]*$"
          required: [type, path, table]
        - properties:
            type:
              type: string
              enum: [forward_message]
            platform:
              type: string
            target:
              type: string
            template:
              type: string
          required: [type, platform, target]
  required: [id, source_topic, action]
  additionalProperties: false
