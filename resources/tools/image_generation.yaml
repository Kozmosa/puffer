id: ImageGeneration
name: ImageGeneration
description: |-
  Generate one or more images through Puffer's configured image media settings
  and write the resulting image artifacts into the workspace image folder.

  Use one ImageGeneration call for one logical image-generation request. When
  the user asks for multiple images from one prompt, set count to the requested
  number instead of issuing multiple count=1 calls. The tool reads a
  workspace-relative prompt file when the prompt value names one; otherwise it
  treats prompt as literal text. The result includes one media job id and one
  artifact entry per persisted image file.
handler: runtime:workflow:image_generation
approval_policy: ask
sandbox_policy: network
input_schema:
  type: object
  properties:
    prompt:
      type: string
      description: Literal prompt text or a workspace-relative prompt file path.
    promptReference:
      type: string
      description: Optional workspace-relative prompt/reference file to prepend as generation context.
    aspect:
      type: string
      description: Aspect ratio such as square, landscape, portrait, 1:1, 16:9, 9:16, or auto.
    count:
      type: integer
      description: Number of images to generate in one request. Must be between 1 and 4.
      minimum: 1
      maximum: 4
    purpose:
      type: string
      description: Optional caller purpose preserved in the result metadata.
    retryFromError:
      description: Optional previous error payload for retrying the same prompt.
  required:
    - prompt
    - count
  additionalProperties: false
metadata:
  may_spawn_processes: false
  may_read_files: true
  may_write_files: true
  may_access_network: true
display:
  group: media
  title: ImageGeneration
  show_in_status: true
