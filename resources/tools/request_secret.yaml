id: RequestSecret
name: RequestSecret
aliases:
  - request-secret
  - request_secret
description: |-
  Search, create, or request an encrypted user secret.

  Use `action: "search"` to list non-secret metadata, `action: "create"` to
  store a new encrypted secret, and `action: "request"` or no action to request
  an existing secret by id or unique name.

  Request results never contain the raw secret. They return a
  `PUFFER_SECRET_...` placeholder that may be referenced in later tool calls.
  Puffer replaces that placeholder with the raw secret only at tool execution
  time and redacts the raw value from tool results before the model or UI sees
  it. Create results also never echo the raw value.
handler: runtime:workflow:request_secret
approval_policy: auto
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    action:
      type: string
      enum:
        - request
        - search
        - create
      description: Defaults to request when omitted.
    id:
      type: string
      description: Exact secret id from Settings > Secrets for request.
    name:
      type: string
      description: Secret name for create or unique existing secret name for request.
    label:
      type: string
      description: Alias for name.
    description:
      type: string
      description: Non-secret description for create or search context.
    query:
      type: string
      description: Search terms for action=search.
    limit:
      type: integer
      minimum: 1
      maximum: 100
      description: Maximum search results to return. Defaults to 20.
    value:
      type: string
      x-puffer-secret: true
      description: Raw secret value for action=create.
    username:
      type: string
      description: Optional non-secret username for action=create.
    origin:
      type: string
      description: Optional non-secret site, URL, or origin for action=create.
    reason:
      type: string
      description: Brief reason the agent needs to request or create this secret.
  additionalProperties: false
metadata:
  may_spawn_processes: false
  may_read_files: true
  may_write_files: true
display:
  group: security
  title: RequestSecret
  show_in_status: true
