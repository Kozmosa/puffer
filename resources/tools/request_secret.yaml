id: RequestSecret
name: RequestSecret
aliases:
  - request-secret
  - request_secret
description: |-
  Search, create, or request an encrypted user secret.

  Use `action: "search"` to list non-secret metadata, `action: "collect"` to
  ask the user for a new encrypted secret, `action: "create"` only when the
  raw value is already safely available as a secret-marked tool value, and
  `action: "request"` or no action to request an existing secret by id or
  unique name.

  When a user asks the agent to log in to a website or service, first use
  `action: "search"` with the site name, domain, origin, username/email hint, or
  login URL before asking the user for credentials. Request a matching secret
  only when the metadata is unambiguous; otherwise ask the user which stored
  credential to use. If no stored credential matches and a credential is
  required, use `action: "collect"` so the user can type it into a masked
  prompt and Puffer can save it in the encrypted vault.

  Request results never contain the raw secret. They return a
  `PUFFER_SECRET_...` placeholder that may be referenced in later tool calls.
  Puffer replaces that placeholder with the raw secret only at tool execution
  time and redacts the raw value from tool results before the model or UI sees
  it. Collect and create results also never echo the raw value.
handler: runtime:workflow:request_secret
approval_policy: auto
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    action:
      type: string
      enum:
        - request
        - search
        - create
        - collect
      description: Defaults to request when omitted.
    id:
      type: string
      description: Exact secret id from Settings > Secrets for request.
    name:
      type: string
      description: Secret name for create or unique existing secret name for request.
    label:
      type: string
      description: Alias for name.
    description:
      type: string
      description: Non-secret description for create or search context.
    query:
      type: string
      description: Search terms for action=search.
    limit:
      type: integer
      minimum: 1
      maximum: 100
      description: Maximum search results to return. Defaults to 20.
    value:
      type: string
      x-puffer-secret: true
      description: Raw secret value for action=create.
    prompt:
      type: string
      description: Optional user-facing prompt for action=collect.
    username:
      type: string
      description: Optional non-secret username for action=create or action=collect.
    origin:
      type: string
      description: Optional non-secret site, URL, or origin for action=create or action=collect.
    reason:
      type: string
      description: Brief reason the agent needs to request, create, or collect this secret.
  additionalProperties: false
metadata:
  may_spawn_processes: false
  may_read_files: true
  may_write_files: true
display:
  group: security
  title: RequestSecret
  show_in_status: true
