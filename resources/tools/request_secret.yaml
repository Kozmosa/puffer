id: RequestSecret
name: RequestSecret
aliases:
  - request-secret
  - request_secret
description: |-
  Request an encrypted user secret by id or label.

  The result never contains the raw secret. It returns a `PUFFER_SECRET_...`
  placeholder that may be referenced in later tool calls. Puffer replaces that
  placeholder with the raw secret only at tool execution time and redacts the
  raw value from tool results before the model or UI sees it.
handler: runtime:workflow:request_secret
approval_policy: auto
sandbox_policy: read-only
input_schema:
  type: object
  properties:
    id:
      type: string
      description: Exact secret id from Settings > Secrets.
    label:
      type: string
      description: Unique secret label from Settings > Secrets.
    reason:
      type: string
      description: Brief reason the agent needs this secret.
  additionalProperties: false
metadata:
  may_spawn_processes: false
  may_read_files: true
  may_write_files: false
display:
  group: security
  title: RequestSecret
  show_in_status: true
