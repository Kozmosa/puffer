id: EnterWorktree
name: EnterWorktree
description: |-
  Create an isolated git worktree and switch the current session into it.

  Use this only when the user explicitly asks to work in a worktree.
handler: runtime:workflow:enter_worktree
approval_policy: auto
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    name:
      type: string
      description: Optional name for the worktree.
  additionalProperties: false
