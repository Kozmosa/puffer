id: ExitWorktree
name: ExitWorktree
description: |-
  Exit a worktree session created by EnterWorktree and return to the original
  directory.

  Use `action: "keep"` to preserve the worktree on disk, or `action: "remove"`
  to delete it.
handler: runtime:workflow:exit_worktree
approval_policy: auto
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    action:
      type: string
      enum:
        - keep
        - remove
      description: Keep or remove the worktree and branch.
    discard_changes:
      type: boolean
      description: Required true to remove when there are uncommitted or unmerged changes.
  required:
    - action
  additionalProperties: false
