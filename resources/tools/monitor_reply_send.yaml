id: MonitorReplySend
name: MonitorReplySend
description: |-
  Send an already human-approved reply for a monitored connector task to the
  task's recorded source.

  Do not use this tool while drafting a Telegram monitor-task reply. During
  agent action turns, use MonitorReplyDraft so Bobo can ask the user to approve
  the final message. This tool reads the task source context, sends the message
  to that exact recorded Telegram chat, writes a delivery receipt, and marks the
  task completed.

  Re-running this tool after its delivery receipt exists is idempotent and will
  not send the reply again.

  If the task does not have a stable sourceContext delivery target, ask the
  user before sending anywhere.
handler: runtime:workflow:monitor_reply_send
approval_policy: ask
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    taskId:
      type: string
      description: The monitor task id to complete after the reply is sent.
    message:
      type: string
      description: The exact message text to send to the task source chat.
  required:
    - taskId
    - message
  additionalProperties: false
