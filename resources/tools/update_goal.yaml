id: update_goal
name: update_goal
description: |-
  Update the existing goal.

  Use this tool only to mark the goal achieved. Set `status` to `complete` only when the objective has actually been achieved and no required work remains.

  Do not mark a goal complete merely because its budget is nearly exhausted or because you are stopping work.

  You cannot use this tool to pause, resume, or budget-limit a goal; those status changes are controlled by the user or system.

  When marking a budgeted goal achieved with status `complete`, report the final token usage from the tool result to the user.

handler: runtime:workflow:update_goal
approval_policy: auto
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    status:
      type: string
      enum:
        - complete
      description: "Required. Set to complete only when the objective is achieved and no required work remains."
  required:
    - status
  additionalProperties: false
