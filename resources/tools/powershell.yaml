id: PowerShell
name: PowerShell
description: |-
  Executes a PowerShell command and returns its output.

  Prefer dedicated tools for file search, file reads, and file edits when they
  are a better fit. Use `run_in_background` for longer-running work when you do
  not need the result immediately.

  Commands run in a sandbox by default. Use `dangerouslyDisableSandbox: true`
  only when you explicitly need to bypass sandbox restrictions.
handler: runtime:workflow:powershell
approval_policy: on-request
sandbox_policy: workspace-write
display:
  group: shell
  title: PowerShell
  show_in_status: true
input_schema:
  type: object
  properties:
    command:
      type: string
      description: The PowerShell command to execute.
    timeout:
      type: integer
      description: Optional timeout in milliseconds.
    description:
      type: string
      description: Clear, concise description of what this command does in active voice.
    run_in_background:
      type: boolean
      description: Set to true to run this command in the background.
    dangerouslyDisableSandbox:
      type: boolean
      description: Set true to override sandboxing and run unsandboxed.
  required:
    - command
  additionalProperties: false
