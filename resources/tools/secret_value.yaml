id: SecretValue
name: SecretValue
description: |-
  Prepare an in-memory secret handle for verified Lambda Skill contracts.

  Use this only through LambdaHostCall when a verified skill needs to carry
  secret material into a follow-up concrete tool without exposing the raw value
  in the tool result.
handler: runtime:workflow:secret_value
approval_policy: ask
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    action:
      type: string
      enum:
        - prepare
      description: Secret-handle action to perform.
    value:
      type: string
      x-puffer-secret: true
      description: Secret material to store in the session-scoped handle store.
    label:
      type: string
      description: Optional non-secret label for the handle.
  required:
    - action
    - value
  additionalProperties: false
metadata:
  may_spawn_processes: false
  may_read_files: false
  may_write_files: false
display:
  group: verified-skills
  title: SecretValue
  show_in_status: true
