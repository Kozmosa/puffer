id: TeamCreate
name: TeamCreate
description: Create a team for coordinating multiple agents around shared tasks.
handler: runtime:workflow:team_create
approval_policy: auto
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    team_name:
      type: string
      description: Name for the new team to create.
    description:
      type: string
      description: Optional team description or purpose.
    agent_type:
      type: string
      description: Optional type/role of the team lead.
  required:
    - team_name
  additionalProperties: false
