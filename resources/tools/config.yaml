id: Config
name: Config
description: |-
  Get or set Claude Code-style configuration settings.

  Use this when the user asks about current settings, requests a configuration
  change, or would benefit from adjusting a setting directly.

  Omit `value` to read the current setting. Provide `value` to update it.
handler: runtime:workflow:config
approval_policy: auto
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    setting:
      type: string
      description: The setting key, such as theme, model, or permissions.defaultMode.
    value:
      description: The new value; omit to get current value.
      oneOf:
        - type: string
        - type: boolean
        - type: number
  required:
    - setting
  additionalProperties: false
