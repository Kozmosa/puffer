id: TaskCreate
name: TaskCreate
description: |-
  Use this tool to create durable workflow tasks only when the user explicitly
  asks to create a task, or when monitor triage instructions require a
  workspace-level connector task. Do not use this tool for ordinary agent
  progress tracking; use TodoWrite for the current-session todo list instead.

  ## When to Use This Tool

  Use this tool only in these scenarios:

  - The user explicitly asks to create a durable task or workflow task.
  - A monitor triage prompt instructs you to create a monitor task from a
    connector event that contains an explicit user request, a schedule or
    deadline, or a service notification clearly requiring user action.

  ## When NOT to Use This Tool

  Skip using this tool when:
  - You are only tracking your own progress in the current agent session.
  - You are breaking down implementation work that the user asked you to do.
  - The user asked for a todo list rather than a durable task.
  - The task is purely conversational or informational.

  ## Task Fields

  - **subject**: A brief, actionable title in imperative form (e.g., "Fix authentication bug in login flow")
  - **description**: What needs to be done
  - **activeForm** (optional): Present continuous form shown in the spinner when the task is in_progress (e.g., "Fixing authentication bug"). If omitted, the spinner shows the subject instead.
  - **receivedAt** (optional): RFC3339 timestamp for when the task source event was received.
  - **expiresAt** (optional): RFC3339 timestamp for when the task should stop being considered current.

  All tasks are created with status `pending`.

  Monitor triage agents may create workspace-level connector tasks by setting
  `metadata._monitor=true` or `metadata.monitor_connection`. For those tasks,
  include `receivedAt`, `expiresAt`, `actions`, and `possibleIgnoreReasons` so
  `/tasks` can offer concrete user choices without another triage pass.
  Monitor triage agents must only create tasks for explicit requests,
  schedules, deadlines, or service notifications that clearly assign work or
  request review/approval from the user. Do not create monitor tasks for
  greetings, thanks, acknowledgements, FYI/status-only updates, generic bot
  summaries, GitHub-style commits/comments/notifications, or repeated source
  updates without an explicit request, assignment, review request, approval
  request, or schedule for the user. Useful information is not a task unless it
  has a clear next action for the user. Monitor triage agents may check
  surrounding context such as recent messages, thread history, linked task
  context, or connector-provided event details when an event is ambiguous, but
  context alone must not turn FYI/status information into a task. When unsure,
  do not create a task.

  Normal agents should not call TaskCreate unless the user explicitly asked to
  create a durable task. For ordinary current-session progress tracking, use
  TodoWrite instead.

  ## Tips

  - Create tasks with clear, specific subjects that describe the outcome
  - After creating tasks, use TaskUpdate to set up dependencies (blocks/blockedBy) if needed
  - Include enough detail in the description for another agent to understand and complete the task
  - New tasks are created with status 'pending' and no owner - use TaskUpdate with the `owner` parameter to assign them
  - Check TaskList first to avoid creating duplicate tasks
handler: runtime:workflow:task_create
approval_policy: auto
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    subject:
      type: string
      description: A brief title for the task.
    description:
      type: string
      description: What needs to be done.
    activeForm:
      type: string
      description: Present continuous form shown while in progress.
    receivedAt:
      type: string
      description: RFC3339 timestamp for when the task source event was received.
    expiresAt:
      type: string
      description: RFC3339 timestamp for when the task should stop being considered current.
    actions:
      type: array
      description: Suggested user-facing actions for monitored connector tasks.
      items:
        type: object
        properties:
          actionName:
            type: string
            description: Short button label for the action.
          actionPrompt:
            type: string
            description: Prompt to send to the current agent when the action is selected.
        required:
          - actionName
          - actionPrompt
        additionalProperties: false
    possibleIgnoreReasons:
      type: array
      description: Suggested reasons the user may choose when ignoring a monitored connector task.
      items:
        type: string
    metadata:
      type: object
      description: Arbitrary metadata to attach to the task.
      additionalProperties: true
  required:
    - subject
    - description
  additionalProperties: false
