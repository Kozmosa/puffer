id: LSP
name: LSP
description: Run language-server code intelligence operations.
handler: runtime:workflow:lsp
approval_policy: auto
sandbox_policy: read-only
input_schema:
  type: object
  properties:
    operation:
      type: string
      enum:
        - goToDefinition
        - findReferences
        - diagnostics
        - hover
        - documentSymbol
        - workspaceSymbol
        - goToImplementation
        - prepareCallHierarchy
        - incomingCalls
        - outgoingCalls
      description: The LSP operation to perform.
    filePath:
      type: string
      description: Absolute or relative file path for the operation.
    line:
      type: integer
      minimum: 1
      description: 1-based line number.
    character:
      type: integer
      minimum: 1
      description: 1-based character offset.
  required:
    - operation
    - filePath
    - line
    - character
