id: ExitPlanMode
name: ExitPlanMode
description: |-
  Exit plan mode and request user approval for the finished plan.

  The plan content should already be written to the plan file before calling
  this tool.
handler: runtime:workflow:exit_plan_mode
approval_policy: auto
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    allowedPrompts:
      type: array
      description: Prompt-based permissions requested by the plan.
      items:
        type: object
        properties:
          tool:
            type: string
            enum:
              - Bash
            description: Tool this prompt applies to.
          prompt:
            type: string
            description: Semantic description of requested action.
        required:
          - tool
          - prompt
        additionalProperties: false
  additionalProperties: false
