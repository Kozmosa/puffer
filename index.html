<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Puffer Hello World</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
        background: #0f172a;
        color: #e2e8f0;
      }

      .card {
        padding: 2rem 3rem;
        border-radius: 16px;
        background: #1e293b;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        text-align: center;
      }

      h1 {
        margin: 0 0 0.5rem;
      }

      p {
        margin: 0;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Hello, Puffer!</h1>
      <p>Your HTML page is working.</p>
    </main>
  </body>
</html>
